name: Build Docker Image

on: 
  workflow_run:
    workflows: ["CI/CD pipeline"] # This workflow will be triggered after the successful completion of the "CI/CD pipeline" workflow 
  workflow_dispatch: 
    inputs:
      image_tag:
        description: 'Tag for the Docker image (e.g., v1.0.0)'
        required: true
        default: 'latest'

permissions:
  contents: read # allows the workflow to read the repository contents
  security-events: write # allows the workflow to create security advisories (if needed)
  actions: read

jobs:
  docker-build:
    name: Elzabeth
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/recommendation-service:${{ inputs.image_tag }} .
  
      - name: Trivy Image Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKER_USERNAME }}/recommendation-service:${{ inputs.image_tag }}
          format: 'sarif'
          output: 'trivy.sarif'
          severity: 'HIGH,CRITICAL'
          exit-code: '0'

      - name: Upload Trivy SARIF to GitHub
        uses: github/codeql-action/upload-sarif@v4
        with:
            sarif_file: trivy.sarif

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push Docker image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/recommendation-service:${{ inputs.image_tag }}

